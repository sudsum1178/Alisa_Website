<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Alisa's Site</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:1rem;background:#f9fafb;color:#111}
    header{display:flex;gap:1rem;align-items:center}
    .hero{display:flex;gap:1rem;align-items:center}
    img{max-width:100%;height:auto}
    .container{max-width:980px;margin:0 auto}
    .photo-strip{display:flex;width:100vw;margin-left:calc(-50vw + 50%);margin-top:.75rem}
    .photo-strip img{width:50vw;height:60vh;object-fit:cover}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Alisa's Corner</h1>
    </header>

    <section class="hero">
      <p>Hello! Welcome to Alisa's website — a place for journals, photos and games.</p>
    </section>

    <section>
      <h2>Photos</h2>
      <div class="photo-strip">
        <img src="images/1.png" alt="Alisa photo 1" />
        <img src="images/2.png" alt="Alisa photo 2" />
      </div>
    </section>

    <footer style="margin-top:2rem">Add more pages: `journal/`, `games/`. When ready I'll help link your domain.</footer>
  </div>
</body>
</html>
