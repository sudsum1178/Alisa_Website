<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Alisa's Site</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:1rem;background:#f9fafb;color:#111}
    header{display:flex;gap:1rem;align-items:center}
    .hero{display:flex;gap:1rem;align-items:center}
    img{max-width:100%;height:auto}
    .container{max-width:980px;margin:0 auto}
    .photo-strip{display:flex;width:100vw;margin-left:calc(-50vw + 50%);margin-top:.75rem}
    .photo-strip img{width:50vw;height:60vh;object-fit:cover;cursor:pointer;transition:opacity .2s}
    .photo-strip img:hover{opacity:.85}
    /* lightbox */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;justify-content:center;align-items:center;cursor:zoom-out}
    #lightbox.active{display:flex}
    #lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px #000}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Alisa's Corner</h1>
    </header>

    <section class="hero">
      <p>Hello! Welcome to Alisa's website — a place for journals, photos and games.</p>
    </section>

    <section>
      <h2>Photos</h2>
      <div class="photo-strip">
        <img src="images/1.png" alt="Alisa photo 1" onclick="openLightbox(this)" />
        <img src="images/2.png" alt="Alisa photo 2" onclick="openLightbox(this)" />
      </div>
    </section>

    <footer style="margin-top:2rem">Add more pages: `journal/`, `games/`. When ready I'll help link your domain.</footer>
  </div>

  <!-- Lightbox overlay -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full screen" />
  </div>

  <script>
    function openLightbox(el) {
      document.getElementById('lightbox-img').src = el.src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
